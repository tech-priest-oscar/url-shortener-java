<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body style="margin:0; padding:0; background-color:#f4f5f7; font-family:Arial, Helvetica, sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f5f7; padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0"
               style="max-width:480px; background-color:#ffffff; border-radius:8px; padding:40px 32px;">
          <tr>
            <td align="center" style="padding-bottom:24px;">
              <h1 style="margin:0; font-size:20px; color:#111827;">Verify your email</h1>
            </td>
          </tr>
          <tr>
            <td style="font-size:15px; color:#374151; line-height:1.6; padding-bottom:24px;">
              Hi <span th:text="${firstName}">there</span>,<br/><br/>
              Thanks for signing up. Enter the code below to verify your email address:
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-bottom:24px;">
              <div style="display:inline-block; background-color:#f3f4f6; border-radius:8px; padding:16px 32px;
                          font-size:32px; font-weight:bold; letter-spacing:8px; color:#111827;"
                   th:text="${otpCode}">00000</div>
            </td>
          </tr>
          <tr>
            <td style="font-size:13px; color:#6b7280; line-height:1.6;">
              This code expires in 10 minutes. If you didn't create an account, you can safely ignore this email.
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
